# OMACOM MANUAL FOR HOTKEY MAPS: https://learn.omacom.io/2/the-omarchy-manual/53/hotkeys#tmux 
# LAYOUT FUNCTIONS: https://learn.omacom.io/2/the-omarchy-manual/106/terminal#tmux-layout-functions
# OMARCHY CONFIG THAT YOU SHOULD SWITCH TO: https://github.com/basecamp/omarchy/blob/dev/config/tmux/tmux.conf

# Omacole Tmux Configuration

# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support (scroll, click, resize panes)
set -g mouse on

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Reduce escape time (important for Neovim)
set -sg escape-time 10

# Focus events (needed for Neovim autoread)
set -g focus-events on

# Source theme
source-file ~/.config/tmux/theme.conf

# OMARCHY NAVIGATION

# Pane Controls
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n
