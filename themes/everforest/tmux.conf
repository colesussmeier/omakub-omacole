# Tmux Theme: Everforest

# Status bar
set -g status-style "bg=#2d353b,fg=#d3c6aa"
set -g status-left "#[bg=#7fbbb3,fg=#2d353b,bold] #S #[default] "
set -g status-right "#[fg=#d3c6aa] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#7fbbb3,fg=#2d353b,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#475258"
set -g pane-active-border-style "fg=#7fbbb3"

# Message/command line
set -g message-style "bg=#dbbc7f,fg=#2d353b"
