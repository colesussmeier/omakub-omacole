# Tmux Theme: Gruvbox

# Status bar
set -g status-style "bg=#282828,fg=#d4be98"
set -g status-left "#[bg=#7daea3,fg=#282828,bold] #S #[default] "
set -g status-right "#[fg=#d4be98] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#7daea3,fg=#282828,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#7daea3"

# Message/command line
set -g message-style "bg=#d8a657,fg=#282828"
