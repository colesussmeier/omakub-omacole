# Tmux Theme: Matte Black

# Status bar
set -g status-style "bg=#121212,fg=#bebebe"
set -g status-left "#[bg=#FFC107,fg=#121212,bold] #S #[default] "
set -g status-right "#[fg=#bebebe] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#FFC107,fg=#121212,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#FFC107"

# Message/command line
set -g message-style "bg=#D35F5F,fg=#121212"
