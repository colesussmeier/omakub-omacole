# Tmux Theme: Osaka Jade

# Status bar
set -g status-style "bg=#111c18,fg=#C1C497"
set -g status-left "#[bg=#2DD5B7,fg=#111c18,bold] #S #[default] "
set -g status-right "#[fg=#C1C497] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#2DD5B7,fg=#111c18,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#23372B"
set -g pane-active-border-style "fg=#2DD5B7"

# Message/command line
set -g message-style "bg=#549e6a,fg=#111c18"
