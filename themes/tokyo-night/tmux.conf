# Tmux Theme: Tokyo Night

# Status bar
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "
set -g status-right "#[fg=#a9b1d6] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#32344a"
set -g pane-active-border-style "fg=#7aa2f7"

# Message/command line
set -g message-style "bg=#e0af68,fg=#1a1b26"
