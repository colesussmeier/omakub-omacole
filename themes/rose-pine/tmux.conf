# Tmux Theme: Rose Pine (Dawn - light theme)

# Status bar
set -g status-style "bg=#faf4ed,fg=#575279"
set -g status-left "#[bg=#56949f,fg=#faf4ed,bold] #S #[default] "
set -g status-right "#[fg=#575279] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#56949f,fg=#faf4ed,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#f2e9e1"
set -g pane-active-border-style "fg=#56949f"

# Message/command line
set -g message-style "bg=#ea9d34,fg=#faf4ed"
