# Tmux Theme: Kanagawa

# Status bar
set -g status-style "bg=#1f1f28,fg=#dcd7ba"
set -g status-left "#[bg=#7e9cd8,fg=#1f1f28,bold] #S #[default] "
set -g status-right "#[fg=#dcd7ba] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#7e9cd8,fg=#1f1f28,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#090618"
set -g pane-active-border-style "fg=#7e9cd8"

# Message/command line
set -g message-style "bg=#c0a36e,fg=#1f1f28"
