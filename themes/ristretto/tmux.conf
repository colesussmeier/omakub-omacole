# Tmux Theme: Ristretto

# Status bar
set -g status-style "bg=#2c2525,fg=#e6d9db"
set -g status-left "#[bg=#a8a9eb,fg=#2c2525,bold] #S #[default] "
set -g status-right "#[fg=#e6d9db] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#a8a9eb,fg=#2c2525,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#463a3a"
set -g pane-active-border-style "fg=#a8a9eb"

# Message/command line
set -g message-style "bg=#f9cc6c,fg=#2c2525"
