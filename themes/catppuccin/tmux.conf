# Tmux Theme: Catppuccin (Macchiato)

# Status bar
set -g status-style "bg=#24273a,fg=#cad3f5"
set -g status-left "#[bg=#8aadf4,fg=#24273a,bold] #S #[default] "
set -g status-right "#[fg=#cad3f5] %H:%M %d-%b "
set -g status-left-length 30

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#8aadf4,fg=#24273a,bold] #I:#W #[default]"

# Pane borders
set -g pane-border-style "fg=#494d64"
set -g pane-active-border-style "fg=#8aadf4"

# Message/command line
set -g message-style "bg=#eed49f,fg=#24273a"
